  <!-- FIM META PIXEL -->

  <style>
    :root {
      --fundo: #05070c;
      --fundo-card: #0b0e16;
      --texto: #ffffff;
      --texto-secundario: #9ca4b5;
      --dourado: #d4b265;
      --dourado-claro: #f6e5b0;
      --borda: rgba(255, 255, 255, 0.12);
      --raio: 23px;
      --sombra: 0 22px 70px rgba(0, 0, 0, 0.58);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html {
      width: 100%;
      min-height: 100%;
      background: var(--fundo);
      scroll-behavior: smooth;
      overscroll-behavior: none;
      touch-action: pan-y;
    }

    body {
      width: 100%;
      min-height: 100svh;
      overflow-x: hidden;
      color: var(--texto);
      background:
        radial-gradient(circle at 50% -12%, rgba(217, 181, 99, 0.17), transparent 30rem),
        radial-gradient(circle at 6% 42%, rgba(52, 74, 142, 0.10), transparent 23rem),
        radial-gradient(circle at 94% 72%, rgba(118, 52, 122, 0.09), transparent 22rem),
        linear-gradient(180deg, #07090f 0%, #05070c 57%, #04050a 100%);
      font-family: "Inter", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      opacity: 0.15;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.026) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.019) 1px, transparent 1px);
      background-size: 42px 42px;
      -webkit-mask-image: linear-gradient(to bottom, #000, transparent 92%);
      mask-image: linear-gradient(to bottom, #000, transparent 92%);
    }

    body::after {
      content: "";
      position: fixed;
      top: -360px;
      left: 50%;
      z-index: -1;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: rgba(225, 190, 106, 0.21);
      filter: blur(125px);
      transform: translateX(-50%);
      pointer-events: none;
    }

    img,
    a {
      -webkit-user-drag: none;
      user-drag: none;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    a:focus-visible {
      outline: 2px solid var(--dourado-claro);
      outline-offset: 5px;
    }

    .pagina {
      width: min(100%, 510px);
      min-height: 100svh;
      margin: 0 auto;
      padding:
        max(30px, env(safe-area-inset-top))
        18px
        max(38px, env(safe-area-inset-bottom));
    }

    .perfil {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 27px;
      text-align: center;
      animation: entradaPerfil 900ms cubic-bezier(.2,.8,.2,1) both;
    }

    .foto-moldura {
      position: relative;
      width: 112px;
      height: 112px;
      padding: 3px;
      border-radius: 50%;
      isolation: isolate;
      background:
        linear-gradient(
          135deg,
          #fff1bd 0%,
          #d0a650 33%,
          #fff5cd 68%,
          #9d7229 100%
        );
      box-shadow:
        0 0 0 5px rgba(213, 181, 108, 0.06),
        0 15px 45px rgba(0, 0, 0, 0.52),
        0 0 38px rgba(213, 181, 108, 0.15);
    }

    .foto-moldura::before {
      content: "";
      position: absolute;
      inset: -10px;
      z-index: -1;
      border: 1px solid rgba(213, 181, 108, 0.16);
      border-radius: inherit;
      animation: pulsarMoldura 3.4s ease-in-out infinite;
    }

    .foto {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      border: 4px solid #0b0d13;
      border-radius: inherit;
      background: #11141b;
    }

    .nome {
      margin-top: 16px;
      font-size: clamp(26px, 6.8vw, 34px);
      line-height: 1.08;
      letter-spacing: -0.045em;
      font-weight: 800;
      text-shadow: 0 2px 18px rgba(255, 255, 255, 0.08);
    }

    .nome-destaque {
      color: transparent;
      background:
        linear-gradient(
          90deg,
          #ffffff 10%,
          #fff1bd 50%,
          #ffffff 90%
        );
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      animation: brilhoNome 6s linear infinite;
    }

    .subtitulo {
      max-width: 355px;
      margin-top: 9px;
      color: var(--texto-secundario);
      font-size: 13px;
      line-height: 1.62;
      font-weight: 400;
    }

    .lista-banners {
      display: grid;
      gap: 16px;
    }

    .banner {
      --atraso: 0ms;
      position: relative;
      display: block;
      overflow: hidden;
      border: 1px solid var(--borda);
      border-radius: var(--raio);
      background: var(--fundo-card);
      box-shadow: var(--sombra);
      opacity: 0;
      transform: translateY(24px);
      animation: entradaBanner 740ms cubic-bezier(.2,.8,.2,1) forwards;
      animation-delay: var(--atraso);
      will-change: transform;
      isolation: isolate;
      transition:
        transform 420ms cubic-bezier(.2,.8,.2,1),
        border-color 350ms ease,
        box-shadow 420ms ease,
        filter 300ms ease;
    }

    .banner:nth-child(1) {
      --atraso: 180ms;
    }

    .banner:nth-child(2) {
      --atraso: 300ms;
    }

    .banner:nth-child(3) {
      --atraso: 420ms;
    }

    .banner::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      border-radius: inherit;
      pointer-events: none;
      background:
        linear-gradient(
          112deg,
          transparent 20%,
          rgba(255, 255, 255, 0.09) 46%,
          transparent 62%
        );
      transform: translateX(-125%);
      transition: transform 720ms ease;
    }

    .banner::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 3;
      border-radius: inherit;
      pointer-events: none;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.09),
        inset 0 -1px 0 rgba(255, 255, 255, 0.035);
    }

    .banner img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: inherit;
      transition:
        transform 520ms cubic-bezier(.2,.8,.2,1),
        filter 500ms ease;
    }

    .seta-banner {
      position: absolute;
      right: 13px;
      bottom: 13px;
      z-index: 4;
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.20);
      border-radius: 50%;
      background: rgba(4, 6, 11, 0.50);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(9px);
      -webkit-backdrop-filter: blur(9px);
      opacity: 0;
      transform: translate(5px, 5px) scale(0.86);
      transition:
        opacity 300ms ease,
        transform 300ms ease,
        background 300ms ease;
    }

    .seta-banner svg {
      width: 15px;
      height: 15px;
      transition: transform 300ms ease;
    }

    .banner.pressionado {
      transform: translateY(1px) scale(0.982) !important;
      filter: brightness(0.93);
    }

    .banner.pressionado .seta-banner {
      opacity: 1;
      transform: scale(0.92);
    }

    .canais {
      margin-top: 30px;
      text-align: center;
      opacity: 0;
      animation: entradaBanner 740ms cubic-bezier(.2,.8,.2,1) 540ms forwards;
    }

    .titulo-canais {
      color: #687083;
      font-size: 9px;
      line-height: 1;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .redes {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 15px;
    }

    .rede {
      position: relative;
      display: grid;
      place-items: center;
      width: 46px;
      height: 46px;
      color: #141720;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(145deg, #ffffff, #e7e8ed);
      box-shadow:
        0 10px 28px rgba(0, 0, 0, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.96);
      overflow: hidden;
      transition:
        transform 280ms ease,
        box-shadow 280ms ease,
        color 280ms ease;
    }

    .rede::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(
          circle at 50% 120%,
          rgba(213, 181, 108, 0.34),
          transparent 58%
        );
      opacity: 0;
      transition: opacity 280ms ease;
    }

    .rede svg {
      position: relative;
      z-index: 1;
      width: 21px;
      height: 21px;
    }

    .rede:active {
      transform: scale(0.90);
    }

    footer {
      margin-top: 28px;
      color: #4f5666;
      text-align: center;
      font-size: 9px;
      line-height: 1.5;
      opacity: 0;
      animation: aparecer 900ms ease 700ms forwards;
    }

    .aviso {
      position: fixed;
      left: 50%;
      bottom: max(22px, env(safe-area-inset-bottom));
      z-index: 99999;
      max-width: calc(100vw - 32px);
      padding: 10px 15px;
      color: #f5f5f7;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 999px;
      background: rgba(13, 16, 24, 0.90);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.50);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      font-size: 11px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 12px);
      transition:
        opacity 220ms ease,
        transform 220ms ease;
    }

    .aviso.mostrar {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (hover: hover) and (pointer: fine) {
      .banner:hover {
        transform: translateY(-7px) scale(1.012);
        border-color: rgba(231, 204, 137, 0.42);
        box-shadow:
          0 28px 75px rgba(0, 0, 0, 0.64),
          0 0 0 1px rgba(213, 181, 108, 0.07),
          0 0 36px rgba(213, 181, 108, 0.08);
      }

      .banner:hover::before {
        transform: translateX(125%);
      }

      .banner:hover img {
        transform: scale(1.025);
        filter: brightness(1.06) saturate(1.04);
      }

      .banner:hover .seta-banner {
        opacity: 1;
        transform: translate(0, 0) scale(1);
        background: rgba(213, 181, 108, 0.23);
      }

      .banner:hover .seta-banner svg {
        transform: translateX(2px);
      }

      .rede:hover {
        color: #000000;
        transform: translateY(-5px) rotate(-2deg);
        box-shadow:
          0 16px 34px rgba(0, 0, 0, 0.50),
          0 0 25px rgba(213, 181, 108, 0.16);
      }

      .rede:hover::before {
        opacity: 1;
      }
    }

    @keyframes entradaPerfil {
      from {
        opacity: 0;
        transform: translateY(-14px) scale(0.97);
        filter: blur(7px);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes entradaBanner {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes aparecer {
      to {
        opacity: 1;
      }
    }

    @keyframes pulsarMoldura {
      0%,
      100% {
        opacity: 0.25;
        transform: scale(0.97);
      }

      50% {
        opacity: 0.72;
        transform: scale(1.04);
      }
    }

    @keyframes brilhoNome {
      to {
        background-position: -200% center;
      }
    }

    @media (max-width: 390px) {
      .pagina {
        padding-left: 13px;
        padding-right: 13px;
      }

      .foto-moldura {
        width: 98px;
        height: 98px;
      }

      .lista-banners {
        gap: 13px;
      }

      .banner {
        border-radius: 20px;
      }

      .seta-banner {
        right: 10px;
        bottom: 10px;
        width: 31px;
        height: 31px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

  <script>
    (() => {
      "use strict";

      const aviso = document.getElementById("avisoProtecao");
      const banners = document.querySelectorAll(".banner");

      let temporizadorAviso;
      let ultimoToque = 0;

      function mostrarAviso() {
        if (!aviso) return;

        aviso.classList.add("mostrar");
        clearTimeout(temporizadorAviso);

        temporizadorAviso = setTimeout(() => {
          aviso.classList.remove("mostrar");
        }, 1300);
      }

      function bloquear(evento, mostrarMensagem = true) {
        evento.preventDefault();
        evento.stopPropagation();

        if (mostrarMensagem) {
          mostrarAviso();
        }

        return false;
      }

      document.addEventListener("contextmenu", (evento) => {
        bloquear(evento);
      }, { capture: true });

      document.addEventListener("copy", (evento) => {
        bloquear(evento);
      }, { capture: true });

      document.addEventListener("cut", (evento) => {
        bloquear(evento);
      }, { capture: true });

      document.addEventListener("paste", (evento) => {
        bloquear(evento);
      }, { capture: true });

      document.addEventListener("selectstart", (evento) => {
        bloquear(evento, false);
      }, { capture: true });

      document.addEventListener("dragstart", (evento) => {
        bloquear(evento, false);
      }, { capture: true });

      document.addEventListener("dblclick", (evento) => {
        bloquear(evento, false);
      }, { passive: false, capture: true });

      document.addEventListener("wheel", (evento) => {
        if (evento.ctrlKey || evento.metaKey) {
          bloquear(evento, false);
        }
      }, { passive: false, capture: true });

      document.addEventListener("keydown", (evento) => {
        const tecla = evento.key.toLowerCase();
        const atalho = evento.ctrlKey || evento.metaKey;

        const bloqueados = [
          "c",
          "x",
          "v",
          "a",
          "s",
          "p",
          "u",
          "+",
          "-",
          "=",
          "0"
        ];

        const ferramentaDesenvolvedor =
          evento.key === "F12" ||
          (atalho && evento.shiftKey && ["i", "j", "c"].includes(tecla));

        if (
          ferramentaDesenvolvedor ||
          (atalho && bloqueados.includes(tecla))
        ) {
          bloquear(evento);
        }
      }, { capture: true });

      document.addEventListener("touchend", (evento) => {
        const agora = Date.now();

        if (agora - ultimoToque <= 300) {
          bloquear(evento, false);
        }

        ultimoToque = agora;
      }, { passive: false, capture: true });

      document.addEventListener("gesturestart", (evento) => {
        bloquear(evento, false);
      }, { passive: false });

      document.addEventListener("gesturechange", (evento) => {
        bloquear(evento, false);
      }, { passive: false });

      document.addEventListener("gestureend", (evento) => {
        bloquear(evento, false);
      }, { passive: false });

      banners.forEach((banner) => {
        const pressionar = () => {
          banner.classList.add("pressionado");
        };

        const soltar = () => {
          banner.classList.remove("pressionado");
        };

        banner.addEventListener("pointerdown", pressionar);
        banner.addEventListener("pointerup", soltar);
        banner.addEventListener("pointercancel", soltar);
        banner.addEventListener("pointerleave", soltar);

        banner.addEventListener("click", () => {
          if (typeof window.fbq === "function") {
            window.fbq("trackCustom", "BioLinkClick", {
              destino: banner.getAttribute("href")
            });
          }
        });
      });

      document.querySelectorAll(".rede").forEach((rede) => {
        rede.addEventListener("click", () => {
          if (typeof window.fbq === "function") {
            window.fbq("trackCustom", "SocialLinkClick", {
              destino: rede.getAttribute("href")
            });
          }
        });
      });
    })();
  </script>
</body>
</html>
