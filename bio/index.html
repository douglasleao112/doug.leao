<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Douglas Leão | Links</title>
  <style>
    :root {
      --bg: #050505;
      --text: #f4f4f4;
      --muted: rgba(255,255,255,0.72);
      --soft: rgba(255,255,255,0.12);
      --soft-2: rgba(255,255,255,0.08);
      --stroke: rgba(255,255,255,0.18);
      --shadow: 0 18px 50px rgba(0,0,0,0.45);
      --radius: 24px;
      --maxw: 440px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    body {
      position: relative;
      display: flex;
      justify-content: center;
      background: #000;
    }

    .app {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      isolation: isolate;
      background: #000;
    }

    .bg-photo,
    .bg-overlay,
    .bg-vignette,
    .bg-blobs,
    .bg-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .bg-photo {
      background-image: url('https://i.imgur.com/yaAWkjB.png');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      opacity: 1;
      filter: brightness(0.52) saturate(0.95) contrast(1.02);
      transform: scale(1.02);
      z-index: 0;
    }

    .bg-overlay {
      background:
        linear-gradient(to top, rgba(0,0,0,0.96) 0%, rgba(0,0,0,0.78) 24%, rgba(0,0,0,0.46) 52%, rgba(0,0,0,0.28) 100%),
        linear-gradient(to right, rgba(0,0,0,0.20), rgba(0,0,0,0.08), rgba(0,0,0,0.20));
      z-index: 1;
    }

    .bg-vignette {
      background: radial-gradient(circle at 50% 18%, rgba(255,255,255,0.06), transparent 34%),
                  radial-gradient(circle at 50% 100%, rgba(0,0,0,0.34), transparent 40%);
      z-index: 2;
      mix-blend-mode: screen;
      opacity: 0.65;
    }

    .bg-grid {
      z-index: 2;
      opacity: 0.08;
      background-image:
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 26px 26px;
      mask-image: linear-gradient(to bottom, rgba(255,255,255,0.45), transparent 72%);
      -webkit-mask-image: linear-gradient(to bottom, rgba(255,255,255,0.45), transparent 72%);
    }

    .bg-blobs {
      z-index: 3;
      overflow: hidden;
      filter: blur(36px);
      opacity: 0.42;
    }

    .blob {
      position: absolute;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, rgba(205,205,205,0.22), rgba(120,120,120,0.10) 45%, rgba(0,0,0,0) 72%);
      animation: drift linear infinite;
      mix-blend-mode: screen;
    }

    .blob:nth-child(1) {
      width: 220px;
      height: 220px;
      left: -40px;
      top: 10%;
      animation-duration: 26s;
    }

    .blob:nth-child(2) {
      width: 180px;
      height: 180px;
      right: -30px;
      top: 22%;
      animation-duration: 30s;
      animation-delay: -8s;
    }

    .blob:nth-child(3) {
      width: 240px;
      height: 240px;
      left: 18%;
      bottom: 18%;
      animation-duration: 34s;
      animation-delay: -12s;
    }

    .blob:nth-child(4) {
      width: 160px;
      height: 160px;
      right: 14%;
      bottom: 32%;
      animation-duration: 28s;
      animation-delay: -4s;
    }

    @keyframes drift {
      0% { transform: translate3d(0,0,0) scale(1); }
      25% { transform: translate3d(22px,-18px,0) scale(1.06); }
      50% { transform: translate3d(-16px,28px,0) scale(0.96); }
      75% { transform: translate3d(26px,10px,0) scale(1.04); }
      100% { transform: translate3d(0,0,0) scale(1); }
    }

    .content {
      position: relative;
      z-index: 5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: max(20px, env(safe-area-inset-top)) 20px max(26px, env(safe-area-inset-bottom));
    }

    .stack {
      width: 100%;
      max-width: var(--maxw);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .brand {
      width: 76px;
      display: block;
      background: transparent;
      border: 0;
      box-shadow: none;
      border-radius: 0;
      padding: 0;
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.9s ease forwards;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,0.35));
    }

    .identity {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.9s ease forwards;
      animation-delay: 0.15s;
    }

    h1 {
      margin: 0;
      font-size: 2.12rem;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-family: "Times New Roman", Times, serif;
      text-shadow: 0 6px 24px rgba(0,0,0,0.45);
    }

    .subtitle {
  margin: 0;
  max-width: 90%;
  font-size: 0.76rem;
  line-height: 1.35;
  font-weight: 500;
  font-family: "Times New Roman", Times, serif;
  color: var(--muted);
  text-align: center;
  text-shadow: 0 4px 18px rgba(0,0,0,0.4);
}

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-top: 12px;
      opacity: 0;
      transform: translateY(18px);
      animation: rise 1s ease forwards;
      animation-delay: 0.28s;
    }

    .link-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 64px;
      padding: 18px 18px 18px 52px;
      border-radius: var(--radius);
      text-decoration: none;
      color: #fff;
      font-size: 0.98rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.12);
      background:
        linear-gradient(180deg, rgba(0,0,0,0.82), rgba(0,0,0,0.72)),
        rgba(0,0,0,0.75);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        inset 0 -1px 0 rgba(0,0,0,0.6),
        0 14px 36px rgba(0,0,0,0.45);
      backdrop-filter: blur(10px) saturate(1.05);
      -webkit-backdrop-filter: blur(10px) saturate(1.05);
      overflow: hidden;
      isolation: isolate;
      transition: transform 0.28s ease, border-color 0.28s ease, background 0.28s ease, box-shadow 0.28s ease;
    }

    .link-btn .btn-icon {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  width: 24px;
  height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  opacity: 0.95;
}

    .link-btn .btn-icon svg {
  width: 24px;
  height: 24px;
  stroke: rgba(255,255,255,0.92);
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

    .link-btn::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: calc(var(--radius) - 1px);
      background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.02));
      pointer-events: none;
      z-index: -2;
    }

    .link-btn::after {
      content: "";
      position: absolute;
      top: -40%;
      left: -55%;
      width: 38%;
      height: 190%;
      transform: rotate(18deg) translateX(0);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
      opacity: 0;
      pointer-events: none;
    }

    .link-btn.shine::after {
      animation: shine 1.55s ease;
    }

    .link-btn:hover,
    .link-btn:focus-visible {
      transform: translateY(-2px) scale(1.01);
      border-color: rgba(255,255,255,0.28);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.19), rgba(255,255,255,0.08)),
        rgba(255,255,255,0.07);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.18),
        inset 0 -1px 0 rgba(255,255,255,0.05),
        0 18px 42px rgba(0,0,0,0.35);
    }

    .link-btn:active {
      transform: scale(0.985);
    }

    .link-btn span {
      position: relative;
      z-index: 2;
    }

    .footer-glow {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 92%;
      height: 260px;
      transform: translateX(-50%);
      background: radial-gradient(circle at 50% 90%, rgba(255,255,255,0.08), transparent 60%);
      z-index: 4;
      pointer-events: none;
      filter: blur(24px);
      opacity: 0.75;
    }

    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shine {
      0% {
        opacity: 0;
        transform: rotate(18deg) translateX(0);
      }
      10% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: rotate(18deg) translateX(520%);
      }
    }

    @media (max-width: 390px) {
      .content {
        padding-left: 16px;
        padding-right: 16px;
      }

      .brand {
        width: 68px;
      }

      .subtitle {
        max-width: 300px;
        font-size: 0.72rem;
      }

      .link-btn {
        min-height: 60px;
        font-size: 0.93rem;
        border-radius: 22px;
      }
    }

@media (min-width: 521px) {
  body {
    padding: 0;
  }

  .app {
    min-height: calc(100vh - 36px);
    border-radius: 32px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.45);
  }
}

    @media (prefers-reduced-motion: reduce) {
      .blob,
      .brand,
      .identity,
      .links,
      .link-btn.shine::after {
        animation: none !important;
      }

      .brand,
      .identity,
      .links {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="bg-photo"></div>
    <div class="bg-overlay"></div>
    <div class="bg-vignette"></div>
    <div class="bg-grid"></div>

    <div class="bg-blobs" aria-hidden="true">
      <span class="blob"></span>
      <span class="blob"></span>
      <span class="blob"></span>
      <span class="blob"></span>
    </div>

    <div class="footer-glow"></div>

    <section class="content">
      <div class="stack">
        <img class="brand" src="https://i.imgur.com/gmCnpyY.png" alt="Logo Douglas Leão" />

        <div class="identity">
          <h1>Dr. Douglas Leão</h1>
          <p class="subtitle">Doutorado com Atletas de Fisiculturismo e Alta Performance e Nutricionista Esportivo pelo Colégio Americano de Medicina do Esporte.</p>
        </div>

        <nav class="links" aria-label="Links principais">
          <a class="link-btn" href="https://wa.me/5562984888498?text=Ol%C3%A1%2C%20vim%20pela%20bio%2C%20e%20gostaria%20de%20saber%20mais%20sobre%20a%20Consult" target="_blank" rel="noopener noreferrer">
            <span class="btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="3.5" y="5" width="17" height="15.5" rx="2.5"></rect>
                <path d="M8 3.5v3"></path>
                <path d="M16 3.5v3"></path>
                <path d="M3.5 9.5h17"></path>
              </svg>
            </span>
             <span>AGENDE SUA CONSULTA</span>
          </a>

          <a class="link-btn" href="https://startfit.app/iniciar/?utm_source=bio" target="_blank" rel="noopener noreferrer">
            <span class="btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M8 4.5h8"></path>
                <path d="M8 7h8"></path>
                <path d="M7 3.5h10a2 2 0 0 1 2 2v14a1 1 0 0 1-1.6.8L15 18.5H7a2 2 0 0 1-2-2v-11a2 2 0 0 1 2-2Z"></path>
                <path d="M9 11h6"></path>
                <path d="M9 14h4"></path>
              </svg>
            </span>
            <span>ELABORE SEU TREINO/DIETA</span>
          </a>
        </nav>
      </div>
    </section>
  </main>

  <script>
    const buttons = [...document.querySelectorAll('.link-btn')];

    function randomBetween(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function triggerShine(button) {
      button.classList.remove('shine');
      void button.offsetWidth;
      button.classList.add('shine');
      setTimeout(() => button.classList.remove('shine'), 1700);
    }

    function scheduleShine(button) {
      const delay = randomBetween(4000, 9000);
      setTimeout(() => {
        triggerShine(button);
        scheduleShine(button);
      }, delay);
    }

    buttons.forEach((button, index) => {
      setTimeout(() => scheduleShine(button), 900 + (index * 700));
    });
  </script>
</body>
</html>
