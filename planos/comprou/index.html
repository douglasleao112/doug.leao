<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F9FAFB" />

  <script>
    (function () {
      const LIGHT_THEME_START_HOUR = 6;
      const DARK_THEME_START_HOUR = 18;

      function getScheduledTheme(date = new Date()) {
        const hour = date.getHours();
        return hour >= LIGHT_THEME_START_HOUR && hour < DARK_THEME_START_HOUR
          ? 'light'
          : 'dark';
      }

      function applyScheduledTheme() {
        const theme = getScheduledTheme();
        const root = document.documentElement;
        const themeColor = document.querySelector('meta[name="theme-color"]');

        root.dataset.theme = theme;
        root.style.colorScheme = theme;

        if (themeColor) {
          themeColor.setAttribute(
            'content',
            theme === 'dark' ? '#111827' : '#F9FAFB'
          );
        }
      }

      applyScheduledTheme();

      document.addEventListener('DOMContentLoaded', function () {
        applyScheduledTheme();

        window.setInterval(applyScheduledTheme, 60 * 1000);

        document.addEventListener('visibilitychange', function () {
          if (!document.hidden) {
            applyScheduledTheme();
          }
        });
      });
    })();
  </script>

  <title>Obrigado pela sua compra | Dr. Douglas Leão</title>
  <meta
    name="description"
    content="Obrigado por adquirir o plano de acompanhamento com o Dr. Douglas Leão."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto+Condensed:wght@400;600;700;900&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --primary: #10B981;
      --primary-dark: #059669;
      --secondary: #6366F1;
      --info: #3B82F6;
      --success: #22C55E;
      --warning: #FBBF24;
      --error: #EF4444;
      --button-text: #FFFFFF;

      --shadow-soft: rgba(15, 23, 42, 0.10);
      --shadow-strong: rgba(15, 23, 42, 0.22);
    }

    html[data-theme="light"] {
      --page-bg: #F9FAFB;
      --surface: #FFFFFF;
      --surface-secondary: #F3F4F6;
      --border: #E5E7EB;
      --border-strong: #D1D5DB;

      --text-primary: #374151;
      --text-secondary: #6B7280;
      --text-muted: #9CA3AF;

      --hero-start: #F9FAFB;
      --hero-middle: #F3F4F6;
      --hero-end: #E5E7EB;

      --eyebrow-bg: rgba(255, 255, 255, 0.82);
      --eyebrow-text: #059669;
      --eyebrow-border: rgba(16, 185, 129, 0.30);

      --card-glass-1: rgba(255, 255, 255, 0.90);
      --card-glass-2: rgba(243, 244, 246, 0.95);

      --shadow-color: rgba(15, 23, 42, 0.12);
      --shadow-card: rgba(15, 23, 42, 0.18);

      --success-badge-bg: #10B981;
      --success-badge-text: #FFFFFF;
    }

    html[data-theme="dark"] {
      --page-bg: #111827;
      --surface: #1F2937;
      --surface-secondary: #374151;
      --border: #374151;
      --border-strong: #4B5563;

      --text-primary: #F3F4F6;
      --text-secondary: #D1D5DB;
      --text-muted: #9CA3AF;

      --hero-start: #111827;
      --hero-middle: #0F172A;
      --hero-end: #1F2937;

      --eyebrow-bg: rgba(17, 24, 39, 0.70);
      --eyebrow-text: #D1FAE5;
      --eyebrow-border: rgba(110, 231, 183, 0.30);

      --card-glass-1: rgba(31, 41, 55, 0.94);
      --card-glass-2: rgba(15, 23, 42, 0.98);

      --shadow-color: rgba(0, 0, 0, 0.30);
      --shadow-card: rgba(0, 0, 0, 0.42);

      --success-badge-bg: #10B981;
      --success-badge-text: #FFFFFF;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--page-bg);
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      padding:
        max(24px, env(safe-area-inset-top))
        18px
        max(24px, env(safe-area-inset-bottom));

      display: flex;
      align-items: center;
      justify-content: center;

      color: var(--text-primary);
      background:
        radial-gradient(
          circle at 50% 8%,
          rgba(16, 185, 129, 0.10),
          transparent 34%
        ),
        radial-gradient(
          circle at 15% 90%,
          rgba(99, 102, 241, 0.07),
          transparent 36%
        ),
        linear-gradient(
          180deg,
          var(--hero-start) 0%,
          var(--hero-middle) 62%,
          var(--hero-end) 100%
        );

      font-family: "Roboto Condensed", Arial, sans-serif;
      transition:
        color 0.28s ease,
        background-color 0.28s ease;
    }

    .page {
      width: min(100%, 560px);
      margin: 0 auto;
    }

    .thank-you-card {
      position: relative;
      overflow: hidden;
      padding: 34px 26px 28px;

      text-align: center;

      border: 1px solid var(--border);
      border-radius: 26px;

      background:
        radial-gradient(
          circle at 15% 5%,
          rgba(255, 255, 255, 0.10),
          transparent 32%
        ),
        radial-gradient(
          circle at 90% 100%,
          rgba(16, 185, 129, 0.12),
          transparent 42%
        ),
        linear-gradient(
          145deg,
          var(--card-glass-1),
          var(--card-glass-2)
        );

      box-shadow:
        0 24px 70px var(--shadow-card),
        inset 0 1px 0 rgba(255, 255, 255, 0.10);

      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);

      transition:
        color 0.28s ease,
        background-color 0.28s ease,
        border-color 0.28s ease,
        box-shadow 0.28s ease;
    }

    .thank-you-card::before {
      content: "";
      position: absolute;
      top: -75%;
      left: -28%;
      width: 70%;
      height: 220%;
      pointer-events: none;

      background:
        linear-gradient(
          110deg,
          transparent 25%,
          rgba(255, 255, 255, 0.10) 49%,
          transparent 74%
        );

      transform: rotate(12deg);
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .success-icon {
      display: grid;
      place-items: center;
      width: 74px;
      height: 74px;
      margin: 0 auto 20px;

      color: var(--success-badge-text);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      background: var(--success-badge-bg);

      font-size: 38px;
      font-weight: 900;
      line-height: 1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;

      margin-bottom: 12px;
      padding: 7px 12px;

      color: var(--eyebrow-text);
      border: 1px solid var(--eyebrow-border);
      border-radius: 999px;
      background: var(--eyebrow-bg);

      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;

      transition:
        color 0.28s ease,
        background-color 0.28s ease,
        border-color 0.28s ease;
    }

    h1 {
      margin: 0;
      color: var(--text-primary);
      font-family: Anton, Impact, sans-serif;
      font-size: clamp(40px, 12vw, 62px);
      font-weight: 400;
      line-height: 0.98;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .lead {
      margin: 17px auto 0;
      max-width: 440px;
      color: var(--text-secondary);
      font-size: clamp(17px, 4.5vw, 20px);
      line-height: 1.45;
    }

    .lead strong {
      color: var(--text-primary);
    }

    .next-step {
      margin: 18px auto 0;
      max-width: 420px;
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .whatsapp-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      width: 100%;
      min-height: 58px;
      margin-top: 25px;
      padding: 15px 20px;

      color: var(--button-text);
      border: 0;
      border-radius: 16px;

      background:
        linear-gradient(
          180deg,
          var(--primary),
          var(--primary-dark)
        );

      box-shadow:
        0 14px 30px rgba(16, 185, 129, 0.24);

      text-decoration: none;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.01em;

      transition:
        transform 0.18s ease,
        filter 0.18s ease,
        box-shadow 0.18s ease;
    }

    .whatsapp-button:hover {
      filter: brightness(1.05);
      transform: translateY(-2px);
      box-shadow:
        0 18px 36px rgba(16, 185, 129, 0.30);
    }

    .whatsapp-button:active {
      transform: scale(0.985);
    }

    .button-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      font-size: 18px;
      line-height: 1;
    }

    .security-note {
      margin: 14px 0 0;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .footer {
      margin-top: 18px;
      color: var(--text-muted);
      text-align: center;
      font-size: 12px;
    }

    @media (max-width: 430px) {
      body {
        padding-right: 12px;
        padding-left: 12px;
      }

      .thank-you-card {
        padding: 30px 18px 23px;
        border-radius: 21px;
      }

      .success-icon {
        width: 68px;
        height: 68px;
        font-size: 34px;
      }

      h1 {
        font-size: 43px;
      }

      .lead {
        font-size: 17px;
      }

      .whatsapp-button {
        min-height: 56px;
        font-size: 17px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body,
      .thank-you-card,
      .eyebrow,
      .whatsapp-button {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="thank-you-card">
      <div class="content">
        <div class="success-icon" aria-hidden="true">✓</div>

        <span class="eyebrow">Compra confirmada</span>

        <h1>Obrigado!</h1>

        <p class="lead">
          Obrigado por adquirir o
          <strong>plano de acompanhamento com o Dr. Douglas Leão.</strong>
        </p>

        <p class="next-step">
          Toque no botão abaixo para prosseguir para a próxima etapa e iniciar seu atendimento.
        </p>

        <a
          class="whatsapp-button"
          href="https://wa.me/5562998746623?text=Ol%C3%A1%2C%20acabei%20de%20adquirir%20ao%20plano%20de%20acompanhamento."
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Prosseguir para a próxima etapa no WhatsApp"
        >
          <span class="button-icon" aria-hidden="true">💬</span>
          <span>Prosseguir para a próxima etapa</span>
        </a>

      
      </div>
    </section>

    <footer class="footer">
      © <span id="year"></span> Douglas Leão. Todos os direitos reservados.
    </footer>
  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
