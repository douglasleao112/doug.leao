          link: "https://chat.whatsapp.com/LJojNqZWlbPL21IdIXMjfe"
        }
      ];

      // conversão correta de data BR
      function parseDataBR(dataStr) {
        const [data, hora] = dataStr.split(" ");
        const [dia, mes, ano] = data.split("/");
        const [h, m] = hora.split(":");

        return new Date(
          Number(ano),
          Number(mes) - 1,
          Number(dia),
          Number(h),
          Number(m)
        );
      }

      for (const periodo of periodos) {
        const inicio = parseDataBR(periodo.inicio);
        const fim = parseDataBR(periodo.fim);

        if (agora >= inicio && agora <= fim) {
          return periodo.link;
        }
      }

      // fallback
      return "https://chat.whatsapp.com/LJojNqZWlbPL21IdIXMjfe";
    }

    setTimeout(() => {
      window.location.href = getRedirectLink();
    }, 50);
