<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Redirecionando...</title>
</head>
<body>
<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxzzf52tLPPg6DnWi1NMtt7Dxo4ImKEWKNHqeebNT9s8KWpInCwhIymDP5N3UtCxOB4/exec";
  const FORM_URL = "https://forms.gle/osEkRBBwK2ng7B5Y6";

  const nome = decodeURIComponent((window.location.hash || "").replace("#", "").trim());

  async function salvarEIrFormulario() {
    if (nome) {
      try {
        const saveUrl = `${SCRIPT_URL}?utm=${encodeURIComponent(nome)}&aba=Compra`;
        await fetch(saveUrl, {
          method: "GET",
          mode: "no-cors"
        });
      } catch (error) {
        console.error("Erro ao salvar:", error);
      }
    }

    setTimeout(() => {
      window.location.href = FORM_URL;
    }, 400);
  }

  salvarEIrFormulario();
</script>
</body>
</html>
